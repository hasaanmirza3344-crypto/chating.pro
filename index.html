<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Realtime Chat App</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="box">
            <h1>Chat App</h1>
            <p>Apna naam likhein aur shuru karein</p>
            <input type="text" id="username-input" placeholder="User Name...">
            <button onclick="startApp()">Enter Chat</button>
        </div>
    </div>

    <div id="dashboard-screen" class="screen" style="display:none;">
        <div class="header">
            <h2 id="my-name-tag">User</h2>
        </div>
        <div class="content-box">
            <h3>Connect with Friend</h3>
            <input type="text" id="target-user-input" placeholder="Dost ka naam likhein...">
            <button onclick="sendChatRequest()">Send Request</button>
            <p id="request-status" style="color: #075e54; font-weight: bold; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen" style="display:none;">
        <div class="header chat-header">
            <button onclick="goBack()" class="back-btn">←</button>
            <h2 id="chat-with-name">Chatting...</h2>
        </div>
        <div id="chat-box" class="chat-area">
            </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type message...">
            <button onclick="sendMessage()">Send
            </button>
        </div>
    </div>

    <div id="request-overlay" class="overlay" style="display:none;">
        <div class="popup">
            <h3 id="requesting-user-name">Incoming Request</h3>
            <p>Kya aap is bande se chat karna chahte hain?</p>
            <div class="actions">
                <button class="accept" id="accept-req">Accept</button>
                <button class="reject" id="reject-req">Reject</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
